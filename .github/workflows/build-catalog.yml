name: Rebuild catalogue

on:
  schedule:
    - cron: "0 3 * * 1"  # every Monday 03:00 UTC
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Rebuild bundled catalogue
        env:
          NBB_LOG_LEVEL: INFO
        run: mcp-nbb-build-catalog --force

      - name: Check for drift
        id: diff
        run: |
          if git diff --quiet src/nbb_mcp/data/catalog; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat src/nbb_mcp/data/catalog | tail -10
          fi

      - name: Open PR with refreshed catalogue
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/refresh-catalog
          commit-message: "chore: refresh NBB catalogue snapshot"
          title: "chore: refresh NBB catalogue snapshot"
          body: |
            Automated refresh of the enriched dataflow catalogue bundled under
            `src/nbb_mcp/data/catalog/`.

            Generated by the weekly `build-catalog.yml` workflow.
          add-paths: src/nbb_mcp/data/catalog/
