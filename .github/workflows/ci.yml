name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify bundled catalogue is present
        shell: bash
        run: |
          test -d src/nbb_mcp/data/catalog
          count=$(ls src/nbb_mcp/data/catalog/BE2_*.json 2>/dev/null | wc -l)
          test "$count" -gt 100 || { echo "Only $count BE2 fiches found"; exit 1; }

      - name: Run unit + integration tests
        run: pytest -q --strict-markers

      - name: Run E2E stdio tests
        run: pytest -q -m e2e

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src tests
      - run: ruff format --check src tests

  build:
    name: build wheel
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - name: Verify bundled catalogue in wheel
        run: |
          python - <<'PY'
          import zipfile, glob
          wheel = glob.glob("dist/*.whl")[0]
          with zipfile.ZipFile(wheel) as z:
              names = z.namelist()
          fiches = [n for n in names if "nbb_mcp/data/catalog/BE2_" in n]
          imf = [n for n in names if "nbb_mcp/data/catalog/IMF_" in n]
          assert len(fiches) + len(imf) == 221, (
              f"wheel bundled {len(fiches)} BE2 + {len(imf)} IMF fiches, expected 221"
          )
          print(f"wheel OK: {wheel} with {len(fiches)} BE2 + {len(imf)} IMF fiches")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
