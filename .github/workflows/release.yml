name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify bundled catalogue in wheel
        run: |
          python - <<'PY'
          import zipfile, glob
          wheel = glob.glob("dist/*.whl")[0]
          with zipfile.ZipFile(wheel) as z:
              names = z.namelist()
          fiches = [n for n in names if n.startswith("nbb_mcp/data/catalog/") and n.endswith(".json")]
          assert len(fiches) >= 200, f"catalogue looks incomplete: {len(fiches)} fiches"
          print(f"release OK: {wheel} ({len(fiches)} fiches)")
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish-pypi:
    name: Publish to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/mcp-nbb
    permissions:
      id-token: write  # required for PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
